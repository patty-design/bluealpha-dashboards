<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blue Alpha — Government Agency Quote Portal</title>
  <link rel="icon" href="https://www.bluealphabelts.com/wp-content/uploads/2019/05/cropped-BAG-FAV-32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:   #1B2438;
      --red:    #7B2318;
      --light:  #f5f7fa;
      --border: #dde3ea;
      --text:   #1a2633;
      --muted:  #6b7a8d;
      --white:  #ffffff;
    }
    body {
      font-family: 'Lato', sans-serif;
      background: var(--light);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: var(--navy);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 18px;
    }
    header img { height: 44px; width: auto; filter: brightness(0) invert(1); }
    .header-divider { width: 2px; height: 36px; background: var(--red); border-radius: 2px; }
    .header-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: rgba(255,255,255,0.75);
      text-transform: uppercase;
      letter-spacing: 3px;
    }
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
    }
    .gate-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      max-width: 520px;
      width: 100%;
      padding: 52px 48px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .shield-icon {
      width: 56px;
      height: 56px;
      background: var(--navy);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .shield-icon svg { width: 28px; height: 28px; fill: var(--white); }
    h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--navy);
      margin-bottom: 14px;
      line-height: 1.25;
    }
    .notice {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.65;
      margin-bottom: 36px;
    }
    .btn-row {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 32px;
      border-radius: 8px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      border: none;
      min-width: 160px;
    }
    .btn-primary {
      background: var(--navy);
      color: var(--white);
    }
    .btn-primary:hover { background: #222d47; transform: translateY(-1px); }
    .btn-outline {
      background: transparent;
      color: var(--navy);
      border: 2px solid var(--navy);
    }
    .btn-outline:hover { background: var(--navy); color: var(--white); transform: translateY(-1px); }
    .divider {
      width: 40px;
      height: 3px;
      background: var(--red);
      border-radius: 2px;
      margin: 0 auto 28px;
    }
    footer {
      text-align: center;
      padding: 20px;
      color: var(--muted);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <header>
    <img src="https://www.bluealphabelts.com/wp-content/uploads/2024/04/logo-1.png" alt="Blue Alpha">
    <div class="header-divider"></div>
    <span class="header-title">Government Agency Portal</span>
  </header>

  <div class="main">
    <div class="gate-card">
      <div class="shield-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4l5 2.18V11c0 3.5-2.33 6.79-5 7.93-2.67-1.14-5-4.43-5-7.93V7.18L12 5zm-1 3v4h2V8h-2zm0 6v2h2v-2h-2z"/>
        </svg>
      </div>
      <h1>Government Agency Portal</h1>
      <div class="divider"></div>
      <p class="notice">
        This portal is for authorized government agencies only. To request a quote,
        your agency must have an approved account.
      </p>
      <div class="btn-row">
        <a href="/apply" class="btn btn-primary">Apply for Access</a>
        <a href="/login" class="btn btn-outline">Log In</a>
      </div>
    </div>
  </div>

  <footer>
    Blue Alpha &bull; bluealphabelts.com &bull; orders@bluealpha.us &bull; 678-961-3304
  </footer>
</body>
</html>

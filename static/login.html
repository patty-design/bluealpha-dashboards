<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blue Alpha — Portal Login</title>
  <link rel="icon" href="https://www.bluealphabelts.com/wp-content/uploads/2019/05/cropped-BAG-FAV-32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:   #1B2438;
      --red:    #7B2318;
      --light:  #f5f7fa;
      --border: #dde3ea;
      --text:   #1a2633;
      --muted:  #6b7a8d;
      --white:  #ffffff;
    }
    body {
      font-family: 'Lato', sans-serif;
      background: var(--light);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: var(--navy);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 18px;
    }
    header img { height: 44px; width: auto; filter: brightness(0) invert(1); }
    .header-divider { width: 2px; height: 36px; background: var(--red); border-radius: 2px; }
    .header-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: rgba(255,255,255,0.75);
      text-transform: uppercase;
      letter-spacing: 3px;
    }
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
    }
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      max-width: 420px;
      width: 100%;
      padding: 48px 40px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .card-icon {
      width: 52px;
      height: 52px;
      background: var(--navy);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    .card-icon svg { width: 26px; height: 26px; fill: var(--white); }
    h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--navy);
      text-align: center;
      margin-bottom: 8px;
    }
    .sub {
      text-align: center;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.55;
      margin-bottom: 28px;
    }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    input[type="email"] {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 11px 14px;
      font-size: 0.92rem;
      font-family: 'Lato', sans-serif;
      color: var(--text);
      transition: border-color 0.15s;
    }
    input:focus { outline: none; border-color: var(--navy); }
    .btn {
      width: 100%;
      background: var(--navy);
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      border: none;
      border-radius: 8px;
      padding: 13px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn:hover { background: #222d47; transform: translateY(-1px); }
    .btn:disabled { background: var(--muted); cursor: not-allowed; transform: none; }
    .result-msg {
      margin-top: 18px;
      background: #eef4ff;
      border: 1px solid #c0d4f0;
      border-radius: 8px;
      padding: 14px 16px;
      color: #1a3a6c;
      font-size: 0.88rem;
      line-height: 1.5;
      text-align: center;
      display: none;
    }
    .divider { width: 36px; height: 3px; background: var(--red); border-radius: 2px; margin: 0 auto 20px; }
    .back-link { text-align: center; margin-top: 20px; }
    .back-link a { font-size: 0.85rem; color: var(--muted); text-decoration: none; }
    .back-link a:hover { color: var(--navy); }
    footer { text-align: center; padding: 20px; color: var(--muted); font-size: 0.8rem; }
  </style>
</head>
<body>
  <header>
    <img src="https://www.bluealphabelts.com/wp-content/uploads/2024/04/logo-1.png" alt="Blue Alpha">
    <div class="header-divider"></div>
    <span class="header-title">Government Agency Portal</span>
  </header>

  <div class="main">
    <div class="card">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
        </svg>
      </div>
      <h1>Portal Login</h1>
      <div class="divider"></div>
      <p class="sub">Enter your email address to receive a secure login link.</p>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="emailInput">Email Address</label>
          <input type="email" id="emailInput" name="email" placeholder="you@agency.gov" required autocomplete="email">
        </div>
        <button type="submit" class="btn" id="submitBtn">Send Login Link</button>
      </form>

      <div class="result-msg" id="resultMsg">
        If that email is registered, you'll receive a link shortly.
      </div>

      <div class="back-link">
        <a href="/quote">← Back to portal home</a>
      </div>
    </div>
  </div>

  <footer>
    Blue Alpha &bull; bluealphabelts.com &bull; info@bluealpha.us &bull; 678-961-3304
  </footer>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('emailInput').value.trim();
      const btn = document.getElementById('submitBtn');
      const resultMsg = document.getElementById('resultMsg');

      if (!email) return;

      btn.disabled = true;
      btn.textContent = 'Sending…';

      try {
        await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
      } catch (_) {}

      // Always show same message
      document.getElementById('loginForm').style.display = 'none';
      resultMsg.style.display = 'block';
    });
  </script>
</body>
</html>

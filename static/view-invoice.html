<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Invoice — Blue Alpha</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; padding: 0; background: #f5f7fa; font-family: 'Lato', 'Helvetica Neue', Arial, sans-serif; color: #1a2633; }
    .page-header {
      background: #1B2438; padding: 18px 32px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .page-header .brand { color: #fff; font-size: 18px; font-weight: 800; letter-spacing: 2px; }
    .page-header .back  { color: #adc4e0; font-size: 0.85rem; text-decoration: none; }
    .page-header .back:hover { color: #fff; }
    .container { max-width: 760px; margin: 16px auto; padding: 0 20px 60px; }

    /* invoiceCard is a transparent wrapper — the inner boxes carry their own borders */
    #invoiceCard { background: transparent; box-shadow: none; border-radius: 0; overflow: visible; padding: 0; }

    /* Invoice header bar */
    .inv-header { background: #1B2438; padding: 20px 28px; display: flex; align-items: flex-start; justify-content: space-between; }
    .inv-header .title { color: #fff; }
    .inv-header .title h1 { margin: 0 0 3px; font-size: 1.3rem; font-weight: 800; letter-spacing: 1px; font-family: 'Montserrat', sans-serif; }
    .inv-header .title .inv-num { color: #adc4e0; font-size: 0.9rem; }

    /* Meta grid — 3 columns: Bill To | Ship To | Details */
    .meta-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0; background: #fff; }
    .meta-block { padding: 18px 28px; }
    .meta-block + .meta-block { border-left: 1px solid #eee; }
    /* Label+value pairs (details column) */
    .meta-label { margin: 0 0 2px; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; color: #8a99aa; font-weight: 700; font-family: 'Montserrat', sans-serif; }
    .meta-value { margin: 0 0 10px; font-size: 0.9rem; color: #1a2633; }
    /* Address labels + lines */
    .addr-title { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: #8a99aa; font-weight: 700; margin: 0 0 7px; font-family: 'Montserrat', sans-serif; }
    .addr-line  { font-size: 0.88rem; color: #1a2633; margin: 0 0 3px; line-height: 1.45; }

    /* Line items table */
    table.items { width: 100%; border-collapse: collapse; }
    table.items thead tr { background: transparent; }
    table.items thead { border-bottom: 2px solid #1B2438; }
    table.items thead th { padding: 10px 16px; color: #8a99aa; font-size: 0.72rem; text-transform: uppercase;
                            letter-spacing: 0.06em; font-weight: 700; text-align: left; font-family: 'Montserrat', sans-serif; }
    table.items thead th:first-child { padding-left: 28px; }
    table.items thead th:last-child  { padding-right: 28px; }
    table.items thead th.right { text-align: right; }
    table.items thead th.center { text-align: center; }
    table.items tbody tr { border-bottom: 1px solid #eee; }
    table.items tbody tr:last-child { border-bottom: none; }
    table.items tbody td { padding: 10px 16px; font-size: 0.88rem; color: #1a2633; }
    table.items tbody td:first-child { padding-left: 28px; }
    table.items tbody td:last-child  { padding-right: 28px; }
    table.items tbody td.right { text-align: right; }
    table.items tbody td.center { text-align: center; }

    /* Totals row */
    .totals-row { display: flex; justify-content: flex-end; padding: 10px 28px 14px; }
    .totals-box { min-width: 240px; border-top: 2px solid #1B2438; padding-top: 8px;
                  display: flex; justify-content: space-between; font-size: 1rem; font-weight: 700; color: #1B2438; }

    /* Footer note */
    .inv-footer { padding: 20px 28px; background: #f5f7fa; border-top: 1px solid #eee;
                   font-size: 0.78rem; color: #8a99aa; line-height: 1.6; }
    .inv-footer strong { color: #BD3333; }

    /* States */
    .loading { text-align: center; padding: 80px 20px; color: #8a99aa; font-size: 0.95rem; }
    .error-box { text-align: center; padding: 60px 20px; }
    .error-box h2 { font-size: 1.1rem; color: #1a2633; margin: 0 0 8px; }
    .error-box p  { color: #8a99aa; font-size: 0.9rem; margin: 0; }

    @media (max-width: 560px) {
      .meta-grid { grid-template-columns: 1fr; }
      .meta-block + .meta-block { border-left: none; border-top: 1px solid #eee; }
      .inv-header { flex-direction: column; gap: 10px; }
      .meta-block, .totals-row, .inv-footer { padding-left: 16px; padding-right: 16px; }
    }
  </style>
</head>
<body>
  <div class="page-header" id="pageHeader">
    <span class="brand">BLUE ALPHA</span>
    <span></span>
  </div>

  <div class="container">
    <div id="backBtnRow" style="margin-bottom:12px;">
      <button id="backBtn" onclick="goBack()" style="background:none;border:none;cursor:pointer;color:#1B2438;font-size:0.9rem;font-weight:600;display:flex;align-items:center;gap:6px;padding:0;">
        ← Back to Invoices
      </button>
    </div>
    <div style="margin-bottom:6px;display:flex;justify-content:flex-end;">
      <button id="downloadBtn" onclick="downloadInvoice()" style="background:#1B2438;color:#fff;border:none;border-radius:6px;padding:8px 16px;font-size:0.82rem;font-weight:700;cursor:pointer;">
        ↓ Download Invoice
      </button>
    </div>
    <div class="card" id="invoiceCard">
      <div class="loading">Loading invoice…</div>
    </div>
  </div>

  <script>
    const recordId = location.pathname.split('/').pop();
    const inPortal = window.self !== window.top;

    // Hide header + back button when inside portal iframe (portal provides its own back button)
    if (inPortal) {
      document.getElementById('pageHeader').style.display = 'none';
      document.getElementById('backBtnRow').style.display = 'none';
    }

    function goBack() {
      if (inPortal) {
        window.parent.postMessage({ type: 'closeViewInvoice' }, '*');
      } else {
        history.back();
      }
    }

    function reportHeight() {
      if (inPortal) {
        window.parent.postMessage({ type: 'viewInvoiceHeight', height: document.body.scrollHeight }, '*');
      }
    }

    function downloadInvoice() {
      const btn = document.getElementById('downloadBtn');
      if (btn) { btn.disabled = true; btn.textContent = 'Downloading…'; }
      const a = document.createElement('a');
      a.href = '/invoice-pdf/' + recordId;
      a.download = '';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => {
        if (btn) { btn.disabled = false; btn.textContent = '⬇ Download PDF'; }
      }, 2000);
    }

    function fmt(s) {
      if (!s) return '—';
      try { return new Date(s + 'T12:00:00').toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }); }
      catch { return s; }
    }
    function esc(s) {
      return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function money(n) {
      return '$' + parseFloat(n || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    async function load() {
      const card = document.getElementById('invoiceCard');
      try {
        const resp = await fetch(`/api/invoice-detail/${recordId}`);
        if (!resp.ok) {
          const d = await resp.json().catch(() => ({}));
          card.innerHTML = `<div class="error-box"><h2>Invoice Not Found</h2><p>${esc(d.error || 'This invoice could not be loaded.')}</p></div>`;
          return;
        }
        const inv = await resp.json();
        document.title = `${esc(inv.invNumber)} — Blue Alpha Invoice`;

        // Due date = invoice date + 30 days
        let dueDate = '—';
        if (inv.date) {
          try {
            const d = new Date(inv.date + 'T12:00:00');
            d.setDate(d.getDate() + 30);
            dueDate = d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
          } catch {}
        }

        // Line items rows
        const liRows = (inv.lineItems || []).map(li => `
          <tr>
            <td>${esc(li.name)}</td>
            <td class="center">${li.qty}</td>
            <td class="right">${money(li.unit_price)}</td>
            <td class="right">${money(li.total)}</td>
          </tr>
        `).join('');

        // Tracking link
        const tn = (inv.tracking || '').trim();
        let trackingHtml = tn ? tn : '—';
        if (tn) {
          const url = /^1Z/i.test(tn.replace(/\s/g,''))
            ? `https://www.ups.com/track?tracknum=${encodeURIComponent(tn)}`
            : `https://tools.usps.com/go/TrackConfirmAction?tLabels=${encodeURIComponent(tn)}`;
          trackingHtml = `<a href="${url}" target="_blank" rel="noopener" style="color:#1B2438;">${esc(tn)}</a>`;
        }

        // Address helpers
        function addrBlock(title, lines) {
          let html = `<div class="addr-title">${title}</div>`;
          lines.filter(Boolean).forEach((ln, i) => {
            html += `<p class="addr-line"${i===0?' style="font-weight:700;"':''}>${esc(ln)}</p>`;
          });
          return html;
        }
        function kv(label, value) {
          return `<p class="meta-label">${label}</p><p class="meta-value">${value}</p>`;
        }

        const billLines = [inv.orgName, inv.contact, inv.addr1, inv.addr2];
        const shipLines = [inv.shipOrg, inv.shipName, inv.shipAddr1, inv.shipAddr2];

        card.innerHTML = `
          <div style="border:2px solid #1B2438;border-radius:10px;overflow:hidden;margin-bottom:12px;">
          <div class="inv-header">
            <div class="title">
              <h1>INVOICE</h1>
              <div class="inv-num">${esc(inv.invNumber)}</div>
            </div>
            <div style="text-align:right;">
              <div style="color:#adc4e0;font-size:0.85rem;font-weight:600;">${esc(inv.orgName || '')}</div>
            </div>
          </div>

          <div class="meta-grid">
            <div class="meta-block">${addrBlock('Bill To', billLines)}</div>
            <div class="meta-block">${addrBlock('Ship To', shipLines)}</div>
            <div class="meta-block">
              ${inv.soNumber ? kv('Sales Order', inv.soNumber) : ''}
              ${kv('Invoice Date', fmt(inv.date))}
              ${kv('Due Date', dueDate)}
              ${inv.poNumber ? kv('PO #', esc(inv.poNumber)) : ''}
              ${inv.shipDate ? kv('Ship Date', fmt(inv.shipDate)) : ''}
              ${inv.tracking ? kv('Tracking', trackingHtml) : ''}
            </div>
          </div>
          </div><!-- /upper box -->

          <div style="border:2px solid #1B2438;border-radius:10px;overflow:hidden;">
            <table class="items">
              <thead>
                <tr>
                  <th>Description</th>
                  <th class="center">Qty</th>
                  <th class="right">Unit Price</th>
                  <th class="right">Total</th>
                </tr>
              </thead>
              <tbody>${liRows || '<tr><td colspan="4" style="text-align:center;color:#aaa;padding:20px 28px;">No line items</td></tr>'}</tbody>
            </table>
            <div class="totals-row">
              <div class="totals-box">
                <span>Total Due</span>
                <span>${money(inv.subtotal)}</span>
              </div>
            </div>
          </div><!-- /items card -->

          ${(inv.stripeCcUrl || inv.stripeAchUrl) ? `
          <div id="paymentSection" style="padding:20px 28px;border-top:1px solid #eee;background:#f9fafb;">
            <div style="font-size:0.8rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:#8a99aa;margin-bottom:12px;">Pay Online</div>
            <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
              ${inv.stripeCcUrl ? `
                <a href="${inv.stripeCcUrl}" target="_blank" rel="noopener"
                  style="display:inline-flex;align-items:center;gap:7px;background:#1B2438;color:#fff;padding:10px 20px;border-radius:7px;font-size:0.88rem;font-weight:700;text-decoration:none;">
                  💳 Pay by Credit Card
                  ${inv.stripeCcStatus === 'Paid' ? '<span style="background:#1a7a3c;color:#fff;font-size:0.7rem;padding:2px 7px;border-radius:10px;margin-left:4px;">PAID</span>' : ''}
                </a>` : ''}
              ${inv.stripeAchUrl ? `
                <a href="${inv.stripeAchUrl}" target="_blank" rel="noopener"
                  style="display:inline-flex;align-items:center;gap:7px;background:#5B7FA0;color:#fff;padding:10px 20px;border-radius:7px;font-size:0.88rem;font-weight:700;text-decoration:none;">
                  🏦 Pay by ACH / Bank Transfer
                  ${inv.stripeAchStatus === 'Paid' ? '<span style="background:#1a7a3c;color:#fff;font-size:0.7rem;padding:2px 7px;border-radius:10px;margin-left:4px;">PAID</span>' : ''}
                </a>` : ''}
            </div>
          </div>` : ''}

          <div class="inv-footer">
            Payment terms: Net 30 from invoice date. <strong>A 1.5% monthly late fee applies to unpaid balances after 30 days.</strong><br>
            Questions? Contact us at <a href="mailto:info@bluealpha.us" style="color:#1B2438;">info@bluealpha.us</a> or 678-961-3304.
          </div>
        `;
      } catch (e) {
        card.innerHTML = `<div class="error-box"><h2>Error</h2><p>${esc(e.message)}</p></div>`;
      }
      setTimeout(reportHeight, 100);
    }

    load();
  </script>
</body>
</html>

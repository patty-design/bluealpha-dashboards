<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patty's Dashboard — Email Pipeline</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; }

  #pw-overlay { position: fixed; inset: 0; background: #1B3A6B; display: flex; align-items: center; justify-content: center; z-index: 9999; }
  .pw-box { background: #fff; border-radius: 12px; padding: 40px; width: 360px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
  .pw-box .logo { font-size: 28px; font-weight: 700; color: #1B3A6B; margin-bottom: 4px; }
  .pw-box .sub { color: #888; font-size: 14px; margin-bottom: 28px; }
  .pw-box input { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; outline: none; margin-bottom: 12px; transition: border-color 0.2s; }
  .pw-box input:focus { border-color: #B22222; }
  .pw-box button { width: 100%; padding: 12px; background: #B22222; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
  .pw-box .error { color: #e53e3e; font-size: 13px; margin-top: 8px; display: none; }

  .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 220px; background: #1B3A6B; color: #fff; padding: 24px 0; display: flex; flex-direction: column; z-index: 200; }
  .sidebar .brand { padding: 0 24px 24px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .sidebar .brand h2 { font-size: 18px; font-weight: 700; color: #B22222; }
  .sidebar .brand p { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 2px; }
  .sidebar nav { padding: 16px 0; }
  .sidebar nav a { display: block; padding: 10px 24px; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; transition: all 0.2s; border-left: 3px solid transparent; }
  .sidebar nav a.active, .sidebar nav a:hover { color: #fff; background: rgba(200,151,58,0.15); border-left-color: #B22222; }
  .sidebar .logout { margin-top: auto; padding: 16px 24px; }
  .sidebar .logout button { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.6); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; width: 100%; transition: all 0.2s; }
  .sidebar .logout button:hover { border-color: #B22222; color: #B22222; }

  .main { margin-left: 220px; min-height: 100vh; display: flex; flex-direction: column; }
  .topbar { background: #fff; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e8ecf0; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
  .topbar h1 { font-size: 20px; font-weight: 700; color: #1B3A6B; }
  .btn-refresh { background: #1B3A6B; color: #fff; border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .btn-refresh:hover { background: #2a3d5c; }

  /* Stats bar */
  .stats-bar { background: #1B3A6B; padding: 14px 32px; display: flex; gap: 32px; }
  .stat { display: flex; flex-direction: column; }
  .stat-val { font-size: 22px; font-weight: 700; color: #B22222; }
  .stat-label { font-size: 11px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

  /* Kanban */
  .kanban-wrap { flex: 1; overflow-x: auto; padding: 24px 32px; }
  .kanban { display: flex; gap: 16px; min-width: max-content; align-items: flex-start; }
  .column { width: 260px; flex-shrink: 0; }
  .col-header { padding: 10px 14px; border-radius: 8px 8px 0 0; font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: space-between; }
  .col-header .col-count { background: rgba(255,255,255,0.25); border-radius: 12px; padding: 2px 8px; font-size: 11px; }
  .col-dev .col-header { background: #d69e2e; color: #fff; }
  .col-written .col-header { background: #3182ce; color: #fff; }
  .col-review .col-header { background: #dd6b20; color: #fff; }
  .col-scheduled .col-header { background: #805ad5; color: #fff; }
  .col-sent .col-header { background: #38a169; color: #fff; }
  .col-body { background: rgba(0,0,0,0.03); border: 1px solid #e8ecf0; border-top: none; border-radius: 0 0 8px 8px; min-height: 200px; padding: 8px; }
  
  .card { background: #fff; border-radius: 8px; padding: 12px; margin-bottom: 8px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); cursor: pointer; transition: all 0.2s; border-left: 3px solid transparent; }
  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); transform: translateY(-1px); border-left-color: #B22222; }
  .card-title { font-size: 13px; font-weight: 700; color: #1B3A6B; margin-bottom: 6px; line-height: 1.3; }
  .card-meta { font-size: 11px; color: #888; display: flex; flex-direction: column; gap: 3px; }
  .card-meta span { display: flex; align-items: center; gap: 4px; }
  .cat-tag { display: inline-block; background: rgba(27,42,74,0.07); color: #1B3A6B; border-radius: 12px; padding: 2px 7px; font-size: 10px; font-weight: 600; }

  /* Detail panel */
  .detail-panel {
    position: fixed; right: -520px; top: 0; bottom: 0; width: 500px; background: #fff;
    box-shadow: -4px 0 30px rgba(0,0,0,0.15); z-index: 500; transition: right 0.3s ease; overflow-y: auto; padding: 0;
    display: flex; flex-direction: column;
  }
  .detail-panel.open { right: 0; }
  .panel-header { background: #1B3A6B; padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; }
  .panel-header h3 { color: #fff; font-size: 16px; font-weight: 700; flex: 1; padding-right: 16px; }
  .panel-close { background: rgba(255,255,255,0.15); border: none; color: #fff; width: 30px; height: 30px; border-radius: 6px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
  .panel-body { flex: 1; padding: 24px; overflow-y: auto; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; font-weight: 700; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; padding: 10px 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; outline: none;
    font-family: inherit; transition: border-color 0.2s; color: #333;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: #B22222; }
  .form-group textarea { resize: vertical; }
  .panel-footer { padding: 16px 24px; border-top: 1px solid #f0f2f5; display: flex; gap: 10px; justify-content: flex-end; background: #fafafa; }
  .btn-save { background: #B22222; color: #fff; border: none; border-radius: 8px; padding: 10px 24px; font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
  .btn-save:hover { background: #8B1A1A; }
  .btn-save:disabled { background: #ccc; cursor: not-allowed; }
  .btn-cancel-panel { background: #f0f2f5; color: #444; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; }

  .overlay-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.2); z-index: 400; }
  .overlay-bg.show { display: block; }

  .loading { text-align: center; padding: 60px; }
  .spinner { width: 40px; height: 40px; border: 3px solid #e0e0e0; border-top-color: #B22222; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  
  .empty-col { text-align: center; padding: 20px; color: #bbb; font-size: 12px; }

  .toast { position: fixed; bottom: 24px; right: 24px; background: #38a169; color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; box-shadow: 0 4px 20px rgba(0,0,0,0.2); z-index: 9000; transform: translateY(100px); opacity: 0; transition: all 0.3s; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { background: #e53e3e; }
</style>
</head>
<body>

<div id="pw-overlay">
  <div class="pw-box">
    <div class="logo"><img src="/static/ba-logo.jpg" alt="Blue Alpha" style="width:180px;margin-bottom:8px;display:block;margin-left:auto;margin-right:auto;"></div>
    <div class="sub">Patty's Dashboard — Email Pipeline</div>
    <input type="password" id="pw-input" placeholder="Enter password" onkeydown="if(event.key==='Enter')checkPw()">
    <button onclick="checkPw()">Unlock Dashboard</button>
    <div class="error" id="pw-error">Incorrect password. Try again.</div>
  </div>
</div>

<div class="sidebar">
  <div class="brand"><img src="/static/ba-logo.jpg" alt="Blue Alpha" style="width:140px;display:block;margin-bottom:4px;"><p>Email Pipeline</p></div>
  <nav>
    <a href="kurt.html">📋 Kurt's Ideas</a>
    <a href="kelly.html">📅 Kelly's Calendar</a>
    <a href="#" class="active">📊 Email Pipeline</a>
    <a href="jesse.html">👁 Jesse's Overview</a>
  </nav>
  <div class="logout"><button onclick="logout()">🔒 Lock Dashboard</button></div>
</div>

<div class="main">
  <div class="topbar">
    <h1>Patty's Dashboard — Email Pipeline</h1>
    <button class="btn-refresh" onclick="loadPipeline()">↻ Refresh</button>
  </div>

  <div class="stats-bar">
    <div class="stat"><div class="stat-val" id="st-total">—</div><div class="stat-label">Total in Pipeline</div></div>
    <div class="stat"><div class="stat-val" id="st-scheduled">—</div><div class="stat-label">Scheduled</div></div>
    <div class="stat"><div class="stat-val" id="st-sent">—</div><div class="stat-label">Sent This Month</div></div>
    <div class="stat"><div class="stat-val" id="st-dev">—</div><div class="stat-label">In Development</div></div>
  </div>

  <div class="kanban-wrap">
    <div id="kanban-loading" class="loading"><div class="spinner"></div><div style="color:#888;">Loading pipeline...</div></div>
    <div class="kanban" id="kanban" style="display:none;"></div>
  </div>
</div>

<!-- Overlay -->
<div class="overlay-bg" id="overlay-bg" onclick="closePanel()"></div>

<!-- Detail Panel -->
<div class="detail-panel" id="detail-panel">
  <div class="panel-header">
    <h3 id="panel-title">Email Details</h3>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body">
    <div class="form-group">
      <label>Email Title</label>
      <input type="text" id="p-title" placeholder="Email title">
    </div>
    <div class="form-group">
      <label>Status</label>
      <select id="p-status">
        <option>In Development</option>
        <option>Copy Written</option>
        <option>In Review</option>
        <option>Scheduled</option>
        <option>Sent</option>
      </select>
    </div>
    <div class="form-group">
      <label>Subject Line</label>
      <input type="text" id="p-subject" placeholder="Email subject line">
    </div>
    <div class="form-group">
      <label>Assigned To</label>
      <input type="text" id="p-assigned" placeholder="Team member">
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="p-desc" rows="3" placeholder="Description"></textarea>
    </div>
    <div class="form-group">
      <label>Copy Draft</label>
      <textarea id="p-copy" rows="6" placeholder="Email copy goes here..."></textarea>
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea id="p-notes" rows="3" placeholder="Notes or comments..."></textarea>
    </div>
  </div>
  <div class="panel-footer">
    <button class="btn-cancel-panel" onclick="closePanel()">Cancel</button>
    <button class="btn-save" id="panel-save-btn" onclick="saveRecord()">💾 Save Changes</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const AT_TOKEN = 'pat3wxVXHb3JhDBBn.e0ca55ff285ba026b093f4232320f63fff16252679f6a4c08cc85ea3425c4954';
const BASE_ID = 'appTCZwoETAInVuiX';
const PIPELINE_TABLE = 'tblrFJ5qikGN5H5X9';
const PASSWORD = 'bluealpha2026';
const PW_KEY = 'ba_patty_auth';

let pipelineData = [];
let editingId = null;

function checkPw() {
  const val = document.getElementById('pw-input').value;
  if (val === PASSWORD) {
    localStorage.setItem(PW_KEY, 'true');
    document.getElementById('pw-overlay').style.display = 'none';
    loadPipeline();
  } else {
    document.getElementById('pw-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
  }
}
function logout() { localStorage.removeItem(PW_KEY); location.reload(); }

if (localStorage.getItem(PW_KEY) === 'true') {
  document.getElementById('pw-overlay').style.display = 'none';
  loadPipeline();
}

async function loadPipeline() {
  document.getElementById('kanban-loading').style.display = 'block';
  document.getElementById('kanban').style.display = 'none';
  
  try {
    let records = [];
    let offset = null;
    do {
      let url = `https://api.airtable.com/v0/${BASE_ID}/${PIPELINE_TABLE}?pageSize=100`;
      if (offset) url += `&offset=${offset}`;
      const res = await fetch(url, { headers: { 'Authorization': `Bearer ${AT_TOKEN}` } });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      records = records.concat(data.records);
      offset = data.offset;
    } while (offset);
    
    pipelineData = records;
    renderKanban();
    updateStats();
  } catch(e) {
    document.getElementById('kanban-loading').innerHTML = `<div style="color:#e53e3e;">Error: ${e.message}</div>`;
  }
}

function updateStats() {
  const now = new Date();
  const thisMonth = now.getMonth();
  const thisYear = now.getFullYear();
  
  const total = pipelineData.length;
  const scheduled = pipelineData.filter(r => r.fields.Status === 'Scheduled').length;
  const sentThisMonth = pipelineData.filter(r => {
    if (r.fields.Status !== 'Sent') return false;
    const d = r.fields['Scheduled Date'];
    if (!d) return false;
    const rd = new Date(d + 'T12:00:00');
    return rd.getMonth() === thisMonth && rd.getFullYear() === thisYear;
  }).length;
  const inDev = pipelineData.filter(r => r.fields.Status === 'In Development').length;
  
  document.getElementById('st-total').textContent = total;
  document.getElementById('st-scheduled').textContent = scheduled;
  document.getElementById('st-sent').textContent = sentThisMonth;
  document.getElementById('st-dev').textContent = inDev;
}

const COLUMNS = [
  { key: 'In Development', cls: 'col-dev', label: 'In Development' },
  { key: 'Copy Written', cls: 'col-written', label: 'Copy Written' },
  { key: 'In Review', cls: 'col-review', label: 'In Review' },
  { key: 'Scheduled', cls: 'col-scheduled', label: 'Scheduled' },
  { key: 'Sent', cls: 'col-sent', label: 'Sent' },
];

function renderKanban() {
  document.getElementById('kanban-loading').style.display = 'none';
  document.getElementById('kanban').style.display = 'flex';
  
  let html = '';
  COLUMNS.forEach(col => {
    const cards = pipelineData.filter(r => r.fields.Status === col.key);
    cards.sort((a,b) => {
      const da = a.fields['Scheduled Date'] || '9999';
      const db = b.fields['Scheduled Date'] || '9999';
      return da.localeCompare(db);
    });
    
    html += `<div class="column ${col.cls}">
      <div class="col-header">${col.label}<span class="col-count">${cards.length}</span></div>
      <div class="col-body">`;
    
    if (!cards.length) {
      html += `<div class="empty-col">No items</div>`;
    } else {
      cards.forEach(r => {
        const f = r.fields;
        html += `<div class="card" onclick="openPanel('${r.id}')">
          <div class="card-title">${escHtml(f['Email Title'] || 'Untitled')}</div>
          <div class="card-meta">
            ${f.Category ? `<span>${escHtml(f.Category)}</span>` : ''}
            ${f['Scheduled Date'] ? `<span>📅 ${new Date(f['Scheduled Date']+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>` : ''}
            ${f['Assigned To'] ? `<span>👤 ${escHtml(f['Assigned To'])}</span>` : ''}
          </div>
        </div>`;
      });
    }
    
    html += `</div></div>`;
  });
  
  document.getElementById('kanban').innerHTML = html;
}

function openPanel(id) {
  const r = pipelineData.find(x => x.id === id);
  if (!r) return;
  const f = r.fields;
  
  editingId = id;
  document.getElementById('panel-title').textContent = f['Email Title'] || 'Edit Email';
  document.getElementById('p-title').value = f['Email Title'] || '';
  document.getElementById('p-status').value = f.Status || 'In Development';
  document.getElementById('p-subject').value = f['Subject Line'] || '';
  document.getElementById('p-assigned').value = f['Assigned To'] || '';
  document.getElementById('p-desc').value = f.Description || '';
  document.getElementById('p-copy').value = f['Copy Draft'] || '';
  document.getElementById('p-notes').value = f.Notes || '';
  
  document.getElementById('panel-save-btn').disabled = false;
  document.getElementById('panel-save-btn').textContent = '💾 Save Changes';
  
  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('overlay-bg').classList.add('show');
}

function closePanel() {
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('overlay-bg').classList.remove('show');
  editingId = null;
}

async function saveRecord() {
  if (!editingId) return;
  const btn = document.getElementById('panel-save-btn');
  btn.disabled = true;
  btn.textContent = 'Saving...';
  
  try {
    const res = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${PIPELINE_TABLE}/${editingId}`, {
      method: 'PATCH',
      headers: { 'Authorization': `Bearer ${AT_TOKEN}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ fields: {
        'Email Title': document.getElementById('p-title').value.trim(),
        'Status': document.getElementById('p-status').value,
        'Subject Line': document.getElementById('p-subject').value.trim(),
        'Assigned To': document.getElementById('p-assigned').value.trim(),
        'Description': document.getElementById('p-desc').value.trim(),
        'Copy Draft': document.getElementById('p-copy').value.trim(),
        'Notes': document.getElementById('p-notes').value.trim(),
      }})
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    
    showToast('✓ Saved successfully!');
    closePanel();
    await loadPipeline();
  } catch(e) {
    showToast(`Error: ${e.message}`, true);
    btn.disabled = false;
    btn.textContent = '💾 Save Changes';
  }
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast', 3500);
}

function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
